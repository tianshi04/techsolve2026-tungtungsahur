services:
  backend:
    build:
      context: ./be
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./be/.env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped

  proxy:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
